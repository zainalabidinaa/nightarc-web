<!--
Supabase template: Invite user
Subject: You're invited to Moonlit
-->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:0;padding:0;background:#f5f5f7;">
  <tr>
    <td align="center" style="padding:48px 16px;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%;max-width:520px;background:#ffffff;border:1px solid #ececf0;border-radius:24px;">
        <tr>
          <td style="padding:40px 36px 34px 36px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#151517;">
            <img src="https://trymoonlit.app/moonlit-icon.png" width="48" height="48" alt="Moonlit" style="display:block;border:0;border-radius:14px;margin:0 0 30px 0;">

            <h1 style="margin:0 0 14px 0;font-size:28px;line-height:1.18;font-weight:700;letter-spacing:0;color:#151517;">
              You're invited to Moonlit
            </h1>

            <p style="margin:0 0 28px 0;font-size:15px;line-height:1.65;color:#66666f;">
              Accept your invite to create your account and start using Moonlit.
            </p>

            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 30px 0;">
              <tr>
                <td style="background:#151517;border-radius:999px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 20px;font-size:14px;line-height:1;font-weight:650;color:#ffffff;text-decoration:none;border-radius:999px;">
                    Accept invite
                  </a>
                </td>
              </tr>
            </table>

            <p style="margin:0 0 10px 0;font-size:12px;line-height:1.55;color:#8c8c94;">
              If the button does not work, copy and paste this link into your browser:
            </p>
            <p style="margin:0 0 28px 0;font-size:12px;line-height:1.55;color:#6f6f78;word-break:break-all;">
              {{ .ConfirmationURL }}
            </p>

            <div style="height:1px;background:#eeeeF2;margin:0 0 22px 0;"></div>

            <p style="margin:0;font-size:12px;line-height:1.55;color:#9a9aa2;">
              If you were not expecting this invite, you can ignore this email.
            </p>
          </td>
        </tr>
      </table>

      <p style="margin:18px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1.5;color:#a0a0a8;">
        Moonlit
      </p>
    </td>
  </tr>
</table>
