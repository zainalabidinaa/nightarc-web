name: LunaApp
options:
  bundleIdPrefix: com.luna
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Luna"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "portrait landscapeLeft landscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "portrait portraitUpsideDown landscapeLeft landscapeRight"
    INFOPLIST_KEY_UIRequiresFullScreen: false
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UIRequiredDeviceCapabilities: "arm64"
    INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleDarkContent"
    INFOPLIST_KEY_CFBundleURLTypes:
      - CFBundleURLSchemes:
        - luna
      - CFBundleURLSchemes:
        - stremio
    INFOPLIST_KEY_UIAppFonts:
      - JetBrainsSans-Regular.ttf
      - JetBrainsSans-SemiBold.ttf
      - JetBrainsSans-Bold.ttf

packages:
  LunaCore:
    path: ../../Packages/LunaCore
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    branch: main

targets:
  LunaApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: LunaCore
      - package: KSPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.luna.app"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
