name: LunaApp
options:
  bundleIdPrefix: com.luna
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Luna"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "portrait"
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UIRequiredDeviceCapabilities: "arm64"
    INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleDarkContent"

packages:
  LunaCore:
    path: ../../Packages/LunaCore

targets:
  LunaApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    dependencies:
      - package: LunaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.luna.app"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
