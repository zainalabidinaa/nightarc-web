name: MoonlitMac
options:
  bundleIdPrefix: com.moonlit
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Moonlit"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright \u00A9 2026 Moonlit"

packages:
  MoonlitCore:
    path: ../../Packages/MoonlitCore
  KSPlayer:
    path: /tmp/ksplayer-clone
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: "4.6.0"

targets:
  MoonlitMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Resources
    dependencies:
      - package: MoonlitCore
      - package: KSPlayer
      - package: Lottie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.moonlit.mac"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        INFOPLIST_KEY_CFBundleIconFile: "AppIcon"
    postBuildScripts:
      - name: Normalize Embedded Frameworks
        script: Scripts/normalize-embedded-frameworks.sh
        outputFiles:
          - "$(DERIVED_FILE_DIR)/NormalizeEmbeddedFrameworks.stamp"

  MoonlitMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: MoonlitMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.moonlit.mac.tests"
