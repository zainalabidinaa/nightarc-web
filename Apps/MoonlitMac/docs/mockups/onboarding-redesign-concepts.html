<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moonlit Onboarding Reference Adaptation</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f7f4;
      --ink: #111113;
      --muted: rgba(17,17,19,.58);
      --soft: rgba(17,17,19,.08);
      --line: rgba(17,17,19,.1);
      --button: #111113;
      --buttonText: #fffefa;
      --ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      --mono: "SF Mono", ui-monospace, Menlo, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: var(--ui);
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 8%, rgba(255,255,255,.9), transparent 28vw),
        linear-gradient(180deg, #dcded9, #bfc2bb);
      padding: 22px;
    }

    button { font: inherit; }

    .workspace {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 1fr 390px 1fr;
      gap: 28px;
      align-items: center;
    }

    .side {
      display: grid;
      gap: 16px;
      align-content: center;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.04;
      max-width: 13ch;
      letter-spacing: 0;
    }

    .note {
      margin: 0;
      color: rgba(17,17,19,.64);
      font-size: 14px;
      line-height: 1.5;
      max-width: 32ch;
    }

    .control-card {
      padding: 14px;
      border: 1px solid rgba(17,17,19,.1);
      border-radius: 18px;
      background: rgba(255,255,255,.48);
      box-shadow: 0 18px 52px rgba(31,32,28,.12);
      backdrop-filter: blur(18px);
    }

    .label {
      margin-bottom: 10px;
      color: rgba(17,17,19,.42);
      font: 700 10px/1 var(--mono);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .step-list {
      display: grid;
      gap: 8px;
    }

    .step-btn {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 12px;
      color: rgba(17,17,19,.56);
      background: transparent;
      padding: 0 12px;
      cursor: pointer;
    }

    .step-btn.active {
      color: var(--ink);
      border-color: rgba(17,17,19,.1);
      background: rgba(255,255,255,.7);
      box-shadow: 0 10px 26px rgba(31,32,28,.08);
    }

    .step-btn span:first-child {
      font-size: 13px;
      font-weight: 700;
    }

    .step-btn span:last-child {
      font: 11px/1 var(--mono);
    }

    .phone {
      width: 390px;
      aspect-ratio: 390 / 844;
      padding: 9px;
      border-radius: 44px;
      background: #0b0b0c;
      box-shadow: 0 34px 90px rgba(31,32,28,.34), inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .screen {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 36px;
      background: var(--paper);
      pointer-events: none;
    }

    .status {
      position: absolute;
      z-index: 20;
      top: 11px;
      left: 15px;
      right: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(17,17,19,.72);
      font-size: 10px;
      font-weight: 800;
    }

    .island {
      position: absolute;
      top: 0;
      left: 50%;
      width: 126px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 0 0 20px 20px;
      background: #050506;
    }

    .top-actions {
      position: absolute;
      z-index: 12;
      top: 52px;
      left: 22px;
      right: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      color: rgba(17,17,19,.36);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .22em;
    }

    .skip {
      border: 0;
      border-radius: 999px;
      color: rgba(17,17,19,.54);
      background: rgba(255,255,255,.72);
      padding: 10px 12px;
      box-shadow: 0 12px 28px rgba(31,32,28,.08);
    }

    .visual {
      position: absolute;
      inset: 78px 0 238px;
      overflow: hidden;
    }

    .poster-field {
      position: absolute;
      inset: 0;
    }

    .floating-poster {
      position: absolute;
      width: var(--w);
      aspect-ratio: 2 / 3;
      left: var(--x);
      top: var(--y);
      border-radius: 10px;
      background: var(--img) center / cover no-repeat;
      box-shadow: 0 18px 36px rgba(31,32,28,.2);
      transform: rotate(var(--r)) scale(var(--s));
      opacity: var(--o);
      cursor: pointer;
      transition: transform 1.15s cubic-bezier(.16,1,.3,1), opacity 1.15s ease, box-shadow 1.15s ease, filter 1.15s ease;
      will-change: transform, opacity;
    }

    .floating-poster.selected {
      z-index: 5;
      opacity: 1;
      transform: rotate(var(--r)) scale(1.12);
      box-shadow: 0 24px 52px rgba(31,32,28,.34);
    }

    .floating-poster.prev-selected {
      z-index: 4;
      opacity: .48;
      transform: rotate(var(--r)) scale(.94);
    }

    .poster-field.switching .floating-poster {
      filter: saturate(.94);
    }

    .action-pill {
      position: absolute;
      z-index: 8;
      display: flex;
      gap: 6px;
      left: var(--pillX);
      top: var(--pillY);
      transform: translate(-50%, -100%);
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(32,33,35,.78);
      box-shadow: 0 14px 34px rgba(31,32,28,.24);
      backdrop-filter: blur(18px);
      transition: left .86s cubic-bezier(.2,.82,.2,1), top .86s cubic-bezier(.2,.82,.2,1), transform .86s cubic-bezier(.2,.82,.2,1), opacity .22s ease;
      will-change: left, top, transform;
    }

    .poster-field.switching .action-pill {
      animation: pillTravel .86s cubic-bezier(.2,.82,.2,1) both;
    }

    .action-pill button {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 999px;
      color: #f8f7f2;
      background: rgba(255,255,255,.1);
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .action-pill button.active {
      color: #111113;
      background: #f8f7f2;
    }

    .library-preview,
    .episode-preview,
    .source-preview,
    .profile-preview {
      position: absolute;
      inset: 0 22px;
      display: grid;
      align-content: center;
      gap: 16px;
    }

    .stack-card {
      min-height: 116px;
      border-radius: 18px;
      background: rgba(255,255,255,.84);
      box-shadow: 0 18px 38px rgba(31,32,28,.12);
      padding: 14px;
    }

    .stack-title {
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .mini-posters {
      display: flex;
      gap: 7px;
    }

    .mini-poster {
      width: 52px;
      aspect-ratio: 2 / 3;
      border-radius: 8px;
      background: var(--img) center / cover no-repeat;
      box-shadow: 0 8px 18px rgba(31,32,28,.14);
    }

    .episode-row {
      min-height: 60px;
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255,255,255,.86);
      box-shadow: 0 12px 30px rgba(31,32,28,.1);
    }

    .episode-thumb {
      height: 44px;
      border-radius: 9px;
      background: var(--img) center / cover no-repeat;
    }

    .episode-row strong {
      display: block;
      font-size: 12px;
      margin-bottom: 3px;
    }

    .episode-row span {
      display: block;
      color: var(--muted);
      font-size: 10px;
    }

    .check {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: var(--ink);
      font-size: 11px;
    }

    .source-preview {
      align-content: start;
      padding-top: 46px;
    }

    .source-hero {
      position: relative;
      height: 170px;
      border-radius: 24px;
      background: rgba(255,255,255,.74);
      box-shadow: 0 22px 54px rgba(31,32,28,.13);
    }

    .source-hero .mini-poster {
      position: absolute;
      width: 92px;
    }

    .source-hero .mini-poster:nth-child(1) { left: 54px; top: 36px; transform: rotate(-10deg); }
    .source-hero .mini-poster:nth-child(2) { left: 124px; top: 22px; transform: rotate(4deg); }
    .source-hero .mini-poster:nth-child(3) { left: 192px; top: 46px; transform: rotate(11deg); }

    .source-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,.86);
      box-shadow: 0 18px 38px rgba(31,32,28,.1);
    }

    .source-card strong { font-size: 15px; }
    .source-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .profile-preview {
      justify-items: center;
    }

    .avatar {
      width: 110px;
      height: 110px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      color: #fff;
      background: #111113;
      font-size: 42px;
      font-weight: 800;
      box-shadow: 0 22px 48px rgba(31,32,28,.18);
    }

    .profile-form {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .profile-form div {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 16px;
      background: rgba(255,255,255,.84);
      padding: 0 16px;
      box-shadow: 0 12px 30px rgba(31,32,28,.1);
      color: var(--muted);
      font-size: 13px;
    }

    .profile-form .apple-signin {
      justify-content: center;
      gap: 8px;
      color: #fff;
      background: #111113;
      font-weight: 800;
    }

    .apple-mark {
      font-size: 17px;
      line-height: 1;
    }

    .copy {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 24px;
      display: grid;
      grid-template-rows: 12px auto 54px;
      gap: 12px;
      z-index: 10;
    }

    .copy > div {
      display: grid;
      gap: 8px;
    }

    .copy h2 {
      margin: 0;
      color: var(--ink);
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: 0;
      max-width: 100%;
      text-align: left;
    }

    .copy p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      max-width: 32ch;
      text-align: left;
    }

    .cta {
      height: 54px;
      border: 0;
      border-radius: 999px;
      color: var(--buttonText);
      background: var(--button);
      font-weight: 800;
      box-shadow: 0 16px 36px rgba(31,32,28,.18);
      cursor: pointer;
    }

    .dots {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      column-gap: 6px;
      justify-content: center;
      align-items: center;
      height: 12px;
      pointer-events: none;
    }

    .dots i {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,19,.16);
    }

    .dots i.active {
      width: 18px;
      background: rgba(17,17,19,.7);
    }

    .prompt {
      min-height: 132px;
      resize: none;
      border: 1px solid rgba(17,17,19,.1);
      border-radius: 16px;
      color: rgba(17,17,19,.62);
      background: rgba(255,255,255,.56);
      padding: 12px;
      font: 12px/1.5 var(--mono);
    }

    .copy-prompt {
      height: 42px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: var(--ink);
      font-weight: 800;
      cursor: pointer;
    }

    body.motion .floating-poster {
      animation: float 4.8s ease-in-out infinite alternate;
      animation-delay: calc(var(--i) * -.32s);
    }

    body.motion .stack-card,
    body.motion .episode-row,
    body.motion .source-card {
      animation: rise .35s ease both;
    }

    @keyframes float {
      from { translate: 0 0; }
      to { translate: 0 -9px; }
    }

    @keyframes pillTravel {
      0% {
        left: var(--fromPillX);
        top: var(--fromPillY);
        opacity: 1;
        transform: translate(-50%, -100%) translateY(0) scale(1);
      }
      22% {
        left: var(--fromPillX);
        top: var(--fromPillY);
        opacity: 0;
        transform: translate(-50%, -100%) translateY(5px) scale(.96);
      }
      34% {
        left: var(--pillX);
        top: var(--pillY);
        opacity: 0;
        transform: translate(-50%, -100%) translateY(7px) scale(.95);
      }
      62% {
        left: var(--pillX);
        top: var(--pillY);
        opacity: .88;
        transform: translate(-50%, -100%) translateY(2px) scale(.99);
      }
      100% {
        left: var(--pillX);
        top: var(--pillY);
        opacity: 1;
        transform: translate(-50%, -100%) translateY(0) scale(1);
      }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      body { display: block; }
      .workspace {
        grid-template-columns: 1fr;
        justify-items: center;
      }
      .side { width: min(390px, 100%); }
      .phone { width: min(390px, 100%); }
    }
  </style>
</head>
<body class="motion">
  <main class="workspace">
    <aside class="side">
      <div>
        <h1>Moonlit onboarding, adapted from your reference</h1>
        <p class="note">Light, airy, tactile. Floating real poster cards, a compact action pill, and clean bottom copy. The content is Moonlit: watch tracking, curated collections, login, and profile routing.</p>
      </div>
      <section class="control-card">
        <div class="label">Screens</div>
        <div class="step-list" id="steps"></div>
      </section>
    </aside>

    <section class="phone">
      <div class="screen" id="screen">
        <div class="status"><span>23:02</span><span>▵ 5G  ▱</span></div>
        <div class="island"></div>
        <div class="top-actions">
          <div class="brand">MOONLIT</div>
          <button class="skip" type="button">Skip</button>
        </div>
        <div class="visual" id="visual"></div>
        <section class="copy">
          <div class="dots" id="dots"></div>
          <div>
            <h2 id="headline"></h2>
            <p id="bodyCopy"></p>
          </div>
          <button class="cta" id="cta" type="button"></button>
        </section>
      </div>
    </section>

    <aside class="side">
      <section class="control-card">
        <div class="label">Controls</div>
        <div class="step-list">
          <button class="step-btn" id="motionToggle" type="button"><span>Motion</span><span>On</span></button>
          <button class="step-btn" id="nextButton" type="button"><span>Next screen</span><span>→</span></button>
          <button class="step-btn" id="copyPrompt" type="button"><span>Copy prompt</span><span>⌘</span></button>
        </div>
      </section>
      <textarea class="prompt" id="prompt" readonly></textarea>
    </aside>
  </main>

  <script>
    const posters = [
      ["Inception", "https://image.tmdb.org/t/p/w500/oYuLEt3zVCKq57qu2F8dT7NIa6f.jpg", "movie", "Mind-bending movies"],
      ["Dune: Part Two", "https://image.tmdb.org/t/p/w500/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg", "movie", "Mind-bending movies"],
      ["Severance", "https://image.tmdb.org/t/p/w500/pPHpeI2X1qEd1CS1SeyrdhZ4qnT.jpg", "show", "Prestige series"],
      ["Oppenheimer", "https://image.tmdb.org/t/p/w500/ptpr0kGAckfQkJeJIt8st5dglvd.jpg", "movie", "Award-winning movies"],
      ["Shogun", "https://image.tmdb.org/t/p/w500/7O4iVfOMQmdCSxhOg1WnzG1AgYT.jpg", "show", "Prestige series"],
      ["The Bear", "https://image.tmdb.org/t/p/w500/sHFlbKS3WLqMnp9t2ghADIJFnuQ.jpg", "show", "Prestige series"],
      ["Blade Runner 2049", "https://image.tmdb.org/t/p/w500/gajva2L0rPYkEWjzgFlBXCAVBE5.jpg", "movie", "Mind-bending movies"],
      ["The Batman", "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg", "movie", "Weekend movie picks"],
      ["Everything Everywhere", "https://image.tmdb.org/t/p/w500/w3LxiVYdWWRvEVdn5RYq6jIqkb1.jpg", "movie", "Award-winning movies"],
      ["Interstellar", "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg", "movie", "Mind-bending movies"],
      ["Arrival", "https://image.tmdb.org/t/p/w500/x2FJsf1ElAgr63Y3PNPtJrcmpoe.jpg", "movie", "Mind-bending movies"],
      ["The Last of Us", "https://image.tmdb.org/t/p/w500/uKvVjHNqB5VmOrdxqAt2F7J78ED.jpg", "show", "Prestige series"],
      ["John Wick: Chapter 4", "https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkF5UHaz0I.jpg", "movie", "Weekend movie picks"],
      ["Poor Things", "https://image.tmdb.org/t/p/w500/kCGlIMHnOm8JPXq3rXM6c5wMxcT.jpg", "movie", "Award-winning movies"]
    ];

    const screens = [
      ["Track everything you watch.", "Add, mark watched, or like any title before your library is even set up.", "Continue", "taste"],
      ["All your entertainment in one place.", "Keep watching, watched, and watchlist rows organized per profile.", "Continue", "library"],
      ["Find what to watch next.", "Browse episodes, collections, and details without losing your place.", "Continue", "episodes"],
      ["Keep everything organized.", "Your Moonlit library, collections, and progress stay tidy across the app.", "Continue", "sources"],
      ["Log in or skip for now.", "Log in to save your library and profiles, or skip and explore as a guest.", "Log in", "login"],
      ["Choose who is watching.", "After login, Moonlit creates a first profile if none exist; otherwise it shows profile selection.", "Continue", "profile"]
    ];

    const positions = [
      [35, 34, 54, -7, .72], [205, 24, 50, 8, .64], [71, 108, 67, -5, .9],
      [184, 114, 66, 5, .78], [292, 118, 56, -8, .68], [104, 228, 62, 6, .62],
      [230, 232, 62, -4, .76], [46, 344, 58, -6, .54], [170, 348, 58, 7, .6],
      [292, 340, 58, -5, .56]
    ];

    let step = 0;
    let selected = 0;
    let liked = false;
    let motion = true;
    let autoTimer = null;
    let autoPausedUntil = 0;
    let switching = false;
    let previousSelected = 0;
    let currentVisualType = null;

    const el = {
      steps: document.getElementById("steps"),
      visual: document.getElementById("visual"),
      dots: document.getElementById("dots"),
      headline: document.getElementById("headline"),
      bodyCopy: document.getElementById("bodyCopy"),
      cta: document.getElementById("cta"),
      prompt: document.getElementById("prompt"),
      screen: document.getElementById("screen"),
      motionToggle: document.getElementById("motionToggle"),
      nextButton: document.getElementById("nextButton"),
      copyPrompt: document.getElementById("copyPrompt")
    };

    el.steps.innerHTML = screens.map((screen, index) => `<button class="step-btn" type="button" data-step="${index}"><span>${screen[0]}</span><span>0${index + 1}</span></button>`).join("");
    el.steps.querySelectorAll("button").forEach((button) => {
      button.addEventListener("click", () => {
        step = Number(button.dataset.step);
        autoPausedUntil = Date.now() + 1200;
        render();
      });
    });

    el.screen.addEventListener("click", () => next());
    el.nextButton.addEventListener("click", next);
    el.motionToggle.addEventListener("click", () => {
      motion = !motion;
      render();
    });
    el.copyPrompt.addEventListener("click", async () => {
      await navigator.clipboard.writeText(el.prompt.value);
      el.copyPrompt.querySelector("span:last-child").textContent = "Copied";
      setTimeout(() => el.copyPrompt.querySelector("span:last-child").textContent = "⌘", 1200);
    });

    document.addEventListener("click", (event) => {
      const action = event.target.closest("[data-action]");
      if (!action) return;
      event.stopPropagation();
      autoPausedUntil = Date.now() + 2200;
      if (action.dataset.action === "heart") liked = !liked;
      updatePosterSelection(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") next();
      if (event.key === "ArrowLeft") {
        step = (step + screens.length - 1) % screens.length;
        autoPausedUntil = Date.now() + 1200;
        render();
      }
    });

    function next() {
      step = (step + 1) % screens.length;
      autoPausedUntil = Date.now() + 1200;
      render();
    }

    function render() {
      const [title, body, cta, type] = screens[step];
      document.body.classList.toggle("motion", motion);
      el.headline.textContent = title;
      el.bodyCopy.textContent = body;
      el.cta.textContent = cta;
      el.dots.innerHTML = screens.map((_, index) => `<i class="${index === step ? "active" : ""}"></i>`).join("");
      el.steps.querySelectorAll("button").forEach((button) => button.classList.toggle("active", Number(button.dataset.step) === step));
      el.motionToggle.querySelector("span:last-child").textContent = motion ? "On" : "Off";

      if (type === "taste") {
        if (currentVisualType !== "taste") {
          el.visual.innerHTML = posterField();
          currentVisualType = "taste";
        }
        updatePosterSelection(false);
      } else {
        currentVisualType = type;
        if (type === "library") el.visual.innerHTML = libraryPreview();
        if (type === "episodes") el.visual.innerHTML = episodePreview();
        if (type === "sources") el.visual.innerHTML = sourcePreview();
        if (type === "login") el.visual.innerHTML = loginPreview();
        if (type === "profile") el.visual.innerHTML = profilePreview();
      }

      el.prompt.value = `Adapt the reference onboarding style to Moonlit: light airy background, floating real poster cards, selected poster with compact + / check / heart action pill, rounded black CTA, skip pill, and bottom copy. Use Moonlit-specific screens for tracking, collection-style library organization, episode discovery, login-or-skip, and profile routing. Avoid playback-availability wording in onboarding copy. Auth comes before profile selection. After login, branch based on profile count: if the user has no profiles, show create-first-profile; if profiles exist, show choose-profile. Current screen: ${title}`;
      updateAutoCycle();
    }

    function updateAutoCycle() {
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
      }
      if (step !== 0 || !motion) return;
      autoTimer = setInterval(() => {
        if (step !== 0 || !motion) return updateAutoCycle();
        if (Date.now() < autoPausedUntil) return;
        smoothSelect((selected + 1) % positions.length);
      }, 2800);
    }

    function smoothSelect(nextSelected) {
      previousSelected = selected;
      selected = nextSelected;
      liked = false;
      updatePosterSelection(true);
    }

    function posterField() {
      const field = posters.concat(posters.slice(0, 1)).slice(0, positions.length).map(([title, url], index) => {
        const [x, y, w, r, o] = positions[index];
        const restingOpacity = Math.min(o, .56);
        return `<div class="floating-poster" data-poster-index="${index}" title="${title}" style="--img:url('${url}');--x:${x}px;--y:${y}px;--w:${w}px;--r:${r}deg;--s:.94;--o:${restingOpacity};--i:${index}"></div>`;
      }).join("");
      const pill = pillPosition(selected);
      return `<div class="poster-field">
        ${field}
        <div class="action-pill" style="--pillX:${pill.x}px;--pillY:${pill.y}px;--fromPillX:${pill.x}px;--fromPillY:${pill.y}px">
          <button type="button" data-action="add">+</button>
          <button type="button" data-action="seen">✓</button>
          <button type="button" data-action="heart" class="${liked ? "active" : ""}">${liked ? "♥" : "♡"}</button>
        </div>
      </div>`;
    }

    function pillPosition(index) {
      const [x, y, w] = positions[index] || positions[0];
      return {
        x: x + w / 2,
        y: Math.max(44, y - w * 0.14 - 8)
      };
    }

    function updatePosterSelection(animate) {
      const field = el.visual.querySelector(".poster-field");
      if (!field) return;
      const previous = pillPosition(previousSelected);
      const current = pillPosition(selected);
      field.classList.toggle("switching", animate);
      field.querySelectorAll(".floating-poster").forEach((poster) => {
        const index = Number(poster.dataset.posterIndex);
        poster.classList.toggle("selected", index === selected);
        poster.classList.toggle("prev-selected", animate && index === previousSelected && index !== selected);
      });

      const pill = field.querySelector(".action-pill");
      pill.style.setProperty("--fromPillX", `${animate ? previous.x : current.x}px`);
      pill.style.setProperty("--fromPillY", `${animate ? previous.y : current.y}px`);
      pill.style.setProperty("--pillX", `${current.x}px`);
      pill.style.setProperty("--pillY", `${current.y}px`);
      const heart = pill.querySelector('[data-action="heart"]');
      heart.classList.toggle("active", liked);
      heart.textContent = liked ? "♥" : "♡";

      if (animate) {
        setTimeout(() => {
          field.classList.remove("switching");
          field.querySelectorAll(".prev-selected").forEach((poster) => poster.classList.remove("prev-selected"));
        }, 900);
      }
    }

    function libraryPreview() {
      const row = (label, items) => `<div class="stack-card"><div class="stack-title">${label}</div><div class="mini-posters">${items.map(([title, url]) => `<div class="mini-poster" title="${title}" style="--img:url('${url}')"></div>`).join("")}</div></div>`;
      const mindBending = posters.filter((item) => item[3] === "Mind-bending movies").slice(0, 5);
      const prestigeSeries = posters.filter((item) => item[3] === "Prestige series").slice(0, 4);
      const movieNight = posters.filter((item) => item[3] === "Award-winning movies" || item[3] === "Weekend movie picks").slice(0, 5);
      return `<div class="library-preview">${row("Mind-bending movies", mindBending)}${row("Prestige series", prestigeSeries)}${row("Movie night picks", movieNight)}</div>`;
    }

    function episodePreview() {
      const discoveryItems = [
        [posters[1], "Added to Movie night"],
        [posters[2], "Next up in Prestige series"],
        [posters[7], "Added to Weekend movie picks"],
        [posters[4], "Continue series"]
      ];
      return `<div class="episode-preview">${discoveryItems.map(([[title, url], label]) => `<div class="episode-row"><div class="episode-thumb" style="--img:url('${url}')"></div><div><strong>${title}</strong><span>${label}</span></div><div class="check">✓</div></div>`).join("")}</div>`;
    }

    function sourcePreview() {
      return `<div class="source-preview"><div class="source-hero">${posters.slice(3, 6).map(([title, url]) => `<div class="mini-poster" title="${title}" style="--img:url('${url}')"></div>`).join("")}</div><div class="source-card"><strong>Collections stay tidy</strong><p>Group favorites, discoveries, and planned watches without extra setup.</p></div><div class="source-card"><strong>Progress stays with you</strong><p>Keep library state and profile preferences in sync after login.</p></div></div>`;
    }

    function loginPreview() {
      return `<div class="profile-preview"><div class="avatar">M</div><div class="profile-form"><div class="apple-signin"><span class="apple-mark"></span><strong>Sign in with Apple</strong></div><div><span>Email</span><strong>zain@example.com</strong></div><div><span>Password</span><strong>••••••••</strong></div><div><span>Guest mode</span><strong>Available</strong></div></div></div>`;
    }

    function profilePreview() {
      return `<div class="profile-preview"><div class="avatar">Z</div><div class="profile-form"><div><span>If no profiles</span><strong>Create first profile</strong></div><div><span>If profiles exist</span><strong>Choose profile</strong></div><div><span>Current session</span><strong>After login</strong></div></div></div>`;
    }

    render();
  </script>
</body>
</html>
