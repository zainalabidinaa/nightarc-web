name: LunaMac
options:
  bundleIdPrefix: com.luna
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Luna"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Luna"

packages:
  LunaCore:
    path: ../../Packages/LunaCore

targets:
  LunaMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
        type: folder
    dependencies:
      - package: LunaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.luna.mac"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
