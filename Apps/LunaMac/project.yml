name: NightarcMac
options:
  bundleIdPrefix: com.nightarc
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Nightarc"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright \u00A9 2026 Nightarc"

packages:
  NightarcCore:
    path: ../../Packages/LunaCore
  KSPlayer:
    path: /tmp/ksplayer-clone
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: "4.6.0"

targets:
  NightarcMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Resources
    dependencies:
      - package: NightarcCore
      - package: KSPlayer
      - package: Lottie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.nightarc.mac"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        INFOPLIST_KEY_CFBundleIconFile: "AppIcon"

  NightarcMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: NightarcMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.nightarc.mac.tests"
