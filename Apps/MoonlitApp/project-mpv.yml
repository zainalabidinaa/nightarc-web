name: MoonlitApp
options:
  bundleIdPrefix: com.moonlit
  deploymentTarget:
    iOS: "18.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_APP_INTENTS_METADATA_GENERATION: false
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Moonlit"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "portrait portraitUpsideDown landscapeLeft landscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "portrait portraitUpsideDown landscapeLeft landscapeRight"
    INFOPLIST_KEY_UIRequiresFullScreen: true
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    INFOPLIST_KEY_UILaunchScreen_Generation: false
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    INFOPLIST_KEY_UIRequiredDeviceCapabilities: "arm64"
    INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleDarkContent"
    INFOPLIST_KEY_CFBundleURLTypes:
      - CFBundleURLSchemes:
        - moonlit
      - CFBundleURLSchemes:
        - stremio
    INFOPLIST_KEY_UIAppFonts:
      - JetBrainsSans-Regular.ttf
      - JetBrainsSans-SemiBold.ttf
      - JetBrainsSans-Bold.ttf

packages:
  MoonlitCore:
    path: ../../Packages/MoonlitCore
  MPVKit:
    path: ../../Vendor/MPVKit
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: "4.6.0"
  SnapshotPreviews:
    url: https://github.com/getsentry/SnapshotPreviews
    from: "0.16.0"

targets:
  MoonlitApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Components/KSPlayerEngine.swift"
          - "Components/KSPlayerViewRepresentable.swift"
      - path: Resources
    dependencies:
      - package: MoonlitCore
      - package: MPVKit
      - package: Lottie
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.moonlit.app"
        DEVELOPMENT_TEAM: 5TWS8P597N
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AppIconOnePiece AppIconOnePieceDark"
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        VALIDATE_WORKSPACE: NO
    postBuildScripts:
      - name: Generate Missing Framework Info.plist
        outputFiles:
          - "$(DERIVED_FILE_DIR)/GenerateMissingFrameworkInfoPlist.stamp"
        script: |
          FRAMEWORKS_DIR="${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          if [ ! -d "${FRAMEWORKS_DIR}" ]; then
            touch "${SCRIPT_OUTPUT_FILE_0}"
            exit 0
          fi
          find "${FRAMEWORKS_DIR}" -name '*.framework' -maxdepth 1 -type d | while read -r FRAMEWORK; do
            PLIST="${FRAMEWORK}/Info.plist"
            NAME=$(basename "${FRAMEWORK}" .framework)
            BUNDLE_IDENTIFIER="com.kintan.ksplayer.$(printf "%s" "${NAME}" | tr '_' '-')"
            if [ ! -f "${PLIST}" ]; then
              /usr/libexec/PlistBuddy \
                -c "Add :CFBundleExecutable string ${NAME}" \
                -c "Add :CFBundleIdentifier string ${BUNDLE_IDENTIFIER}" \
                -c "Add :CFBundleInfoDictionaryVersion string 6.0" \
                -c "Add :CFBundleName string ${NAME}" \
                -c "Add :CFBundlePackageType string FMWK" \
                -c "Add :CFBundleShortVersionString string 1.0" \
                -c "Add :CFBundleVersion string 1" \
                -c "Add :MinimumOSVersion string 14.0" \
                "${PLIST}"
              echo "note: Generated Info.plist for ${NAME}"
            else
              /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_IDENTIFIER}" "${PLIST}" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string ${BUNDLE_IDENTIFIER}" "${PLIST}"
            fi
            if [ "${CODE_SIGNING_ALLOWED:-NO}" = "YES" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
              /usr/bin/codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "${FRAMEWORK}"
            fi
          done
          touch "${SCRIPT_OUTPUT_FILE_0}"

  MoonlitAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: MoonlitApp
      - package: SnapshotPreviews
        product: SnapshottingTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.moonlit.app.tests"
        DEVELOPMENT_TEAM: 5TWS8P597N
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MoonlitApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MoonlitApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
